<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systumm Hang VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #030508; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 10px; overflow: hidden; }
        
        .app-container { background: rgba(5, 10, 20, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 255, 0.4); box-shadow: 0 0 30px rgba(0, 229, 255, 0.2); border-radius: 20px; width: 100%; max-width: 420px; height: 95vh; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        
        .header { text-align: center; padding: 20px 10px; border-bottom: 1px solid rgba(0, 229, 255, 0.2); box-shadow: 0 5px 15px rgba(0, 229, 255, 0.05); background: linear-gradient(180deg, rgba(0,229,255,0.1) 0%, transparent 100%); }
        .main-title { font-family: 'Black Ops One', cursive; font-size: 28px; color: #00e5ff; text-shadow: 0 0 15px #00e5ff, 0 0 30px rgba(0,229,255,0.8); letter-spacing: 2px; margin: 0; }
        .sub-title { font-size: 11px; color: #88ddff; text-transform: uppercase; letter-spacing: 4px; margin-top: 5px; font-weight: bold;}

        .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; scrollbar-width: none; }
        .content-area::-webkit-scrollbar { display: none; }
        
        .screen { display: none; animation: fadeIn 0.3s ease-in; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .stats-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .stat { background: #001a22; padding: 8px 5px; border-radius: 8px; border: 1px dashed #00e5ff; font-weight: bold; font-size: 12px; box-shadow: 0 0 10px rgba(0, 229, 255, 0.1); flex: 1; text-align: center;}
        .win-txt { color: #00ffaa; text-shadow: 0 0 5px #00ffaa; }
        .loss-txt { color: #ff3366; text-shadow: 0 0 5px #ff3366; }
        .lvl-txt { color: #ffcc00; text-shadow: 0 0 5px #ffcc00; }

        .live-pred-box { background: rgba(0, 229, 255, 0.05); border: 2px solid #00e5ff; border-radius: 12px; padding: 20px 10px; text-align: center; margin-bottom: 20px; box-shadow: 0 0 20px rgba(0, 229, 255, 0.15); position: relative; }
        .live-clock { font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 900; color: #00e5ff; text-shadow: 0 0 15px #00e5ff; margin-bottom: 10px; }
        .live-pred-title { color: #88ddff; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: bold; }
        .live-pred-value { font-size: 42px; font-weight: 900; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.8); text-transform: uppercase; line-height: 1.1; }

        .section-title { color: #88ddff; font-size: 13px; margin-bottom: 8px; margin-top: 10px; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid rgba(0,229,255,0.3); padding-bottom: 5px;}
        
        .input-group { margin-bottom: 15px; }
        label { color: #00e5ff; font-size: 12px; font-weight: bold; margin-bottom: 5px; display: block; }
        input[type="text"] { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid #00e5ff; color: #fff; border-radius: 8px; outline: none; transition: 0.3s; }
        input[type="text"]:focus { box-shadow: 0 0 15px rgba(0, 229, 255, 0.5); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; background: #001a22; color: #00e5ff; border: 1px solid #00e5ff; font-size: 14px; }
        button:hover { background: #00e5ff; color: #000; box-shadow: 0 0 15px #00e5ff; }
        
        .power-btn { width: 100%; padding: 15px; font-size: 16px; border-radius: 10px; color: #00ffaa; border: 2px solid #00ffaa; background: rgba(0, 255, 170, 0.1); font-weight: 900; letter-spacing: 1px; margin-bottom: 15px; }
        .power-btn:hover { background: #00ffaa; color: #000; box-shadow: 0 0 20px #00ffaa; }
        .power-btn.active-stop { color: #ff3366; border-color: #ff3366; background: rgba(255, 51, 102, 0.1); }
        .power-btn.active-stop:hover { background: #ff3366; color: #fff; box-shadow: 0 0 20px #ff3366; }

        .btn-full { grid-column: span 2; }
        .btn-save { background: #00e5ff; color: #000; box-shadow: 0 0 10px #00e5ff; margin-top: 10px;}

        .server-btn { background: #001a22; color: #aaa; border: 1px solid #335566; }
        .server-btn.active.aipro { background: #8a2be2; color: #fff; border-color: #8a2be2; box-shadow: 0 0 20px #8a2be2; }
        .server-btn.active.premium { background: #00e5ff; color: #000; border-color: #00e5ff; box-shadow: 0 0 20px #00e5ff; }

        .session-log { margin-top: 5px; padding: 10px; background: rgba(0,0,0,0.6); border: 1px dashed #00e5ff; border-radius: 8px; height: 110px; overflow-y: auto; font-size: 12px; line-height: 1.5; display: flex; flex-direction: column; gap: 6px; }
        .log-entry { background: #001a22; padding: 6px 10px; border-left: 3px solid #00e5ff; border-radius: 4px; }
        .log-win { border-color: #00ffaa; }
        .log-loss { border-color: #ff3366; }
        .log-del { border-color: #ffcc00; color: #aaa;}

        /* Side-by-Side History Design */
        .history-list { display: flex; flex-direction: column; gap: 10px; }
        .history-card { background: #001a22; border: 1px solid rgba(0, 229, 255, 0.3); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.5);}
        .h-period { background: rgba(0, 229, 255, 0.1); text-align: center; padding: 6px; font-weight: bold; font-size: 12px; letter-spacing: 1px; color: #88ddff; border-bottom: 1px solid rgba(0, 229, 255, 0.2);}
        .h-body { display: flex; justify-content: space-between; padding: 10px;}
        .h-side { flex: 1; text-align: center; display: flex; flex-direction: column; gap: 5px; }
        .h-divider { width: 1px; background: rgba(0, 229, 255, 0.2); margin: 0 10px; }
        .h-title { font-size: 10px; color: #558899; text-transform: uppercase; font-weight: bold; }
        .h-val { font-size: 16px; font-weight: 900; }
        .badge { display: inline-block; padding: 3px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; text-transform: uppercase; margin-top: 4px;}
        .badge-win { background: rgba(0, 255, 170, 0.2); color: #00ffaa; border: 1px solid #00ffaa; }
        .badge-loss { background: rgba(255, 51, 102, 0.2); color: #ff3366; border: 1px solid #ff3366; }
        .txt-red { color: #ff3366; text-shadow: 0 0 5px rgba(255,51,102,0.5);}
        .txt-green { color: #00ffaa; text-shadow: 0 0 5px rgba(0,255,170,0.5);}

        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; background: #000b11; border-top: 1px solid rgba(0, 229, 255, 0.3); display: flex; justify-content: space-around; padding: 10px 0; box-shadow: 0 -5px 15px rgba(0, 229, 255, 0.1); z-index: 10;}
        .nav-btn { background: transparent; border: none; color: #558899; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 11px; padding: 5px; box-shadow: none; text-transform: none; }
        .nav-btn:hover { background: transparent; color: #00e5ff; box-shadow: none; }
        .nav-btn.active { color: #00e5ff; text-shadow: 0 0 10px #00e5ff; font-weight: bold; }
        .nav-icon { font-size: 20px; }

        #toast { visibility: hidden; min-width: 250px; background-color: rgba(0,0,0,0.9); border: 1px solid #00e5ff; color: #fff; text-align: center; border-radius: 8px; padding: 12px; position: absolute; z-index: 100; left: 50%; top: 20px; transform: translateX(-50%); font-weight: bold; font-size: 13px; box-shadow: 0 0 15px rgba(0,229,255,0.4); opacity: 0; transition: opacity 0.3s, top 0.3s; }
        #toast.show { visibility: visible; opacity: 1; top: 40px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="toast">Connecting...</div>
        
        <div class="header">
            <h1 class="main-title">SYSTUMM HANG</h1>
            <div class="sub-title">VIP RAO SAHAB SYSTEM</div>
        </div>

        <div class="content-area">
            
            <div id="mainScreen" class="screen active">
                <div class="stats-bar">
                    <div class="stat win-txt">🟢 WIN: <span id="winCount">0</span></div>
                    <div class="stat loss-txt">🔴 LOSS: <span id="lossCount">0</span></div>
                    <div class="stat lvl-txt">📈 LVL: <span id="currentLevelDisplay">1</span></div>
                </div>

                <div class="live-pred-box">
                    <div class="live-clock" id="liveTime">30s</div>
                    <div class="live-pred-title" id="predPeriod">Waiting for Session...</div>
                    <div class="live-pred-value" id="predValue">--</div>
                </div>

                <div class="section-title">Prediction Server</div>
                <div class="btn-grid">
                    <button id="btnAiPro" class="server-btn" onclick="setServer('AIPRO')">🟣 AI PRO</button>
                    <button id="btnPremium" class="server-btn active premium" onclick="setServer('PREMIUM')">💠 RAO PREMIUM</button>
                </div>

                <button class="power-btn" id="powerBtn" onclick="toggleBot()">▶️ START VIP</button>

                <div class="section-title">Live Session Log</div>
                <div class="session-log" id="sessionLog">
                    <div class="log-entry" style="text-align:center; color:#558899; border:none;">Bot is offline. Hang the system!</div>
                </div>
            </div>

            <div id="settingsScreen" class="screen">
                <div class="section-title">Telegram Configuration</div>
                <div class="input-group">
                    <label>Bot Token</label>
                    <input type="text" id="botToken" placeholder="Enter Telegram Bot Token">
                </div>
                <div class="input-group">
                    <label>Chat ID / Channel ID</label>
                    <input type="text" id="chatId" placeholder="Enter Target Chat ID">
                </div>
                
                <button class="btn-full btn-save" onclick="saveSettings()">💾 Save Settings</button>
                <div id="saveMsg" style="color:#00ffaa; text-align:center; margin-top:10px; font-size:12px; display:none;">Settings Saved Successfully!</div>
            </div>

            <div id="historyScreen" class="screen">
                <div class="section-title" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>Calculated Past Results</span>
                    <button onclick="loadHistory()" style="padding: 5px 10px; font-size:10px; border-radius: 5px;">🔄 Refresh Server API</button>
                </div>
                
                <div class="history-list" id="historyContainer">
                    <p style="text-align:center; color:#558899; font-size:12px; margin-top:10px;">Click Refresh to load side-by-side history.</p>
                </div>
            </div>

        </div>

        <div class="bottom-nav">
            <button class="nav-btn active" id="nav-mainScreen" onclick="switchTab('mainScreen')">
                <span class="nav-icon">🏠</span>
                <span>Main</span>
            </button>
            <button class="nav-btn" id="nav-settingsScreen" onclick="switchTab('settingsScreen')">
                <span class="nav-icon">⚙️</span>
                <span>Settings</span>
            </button>
            <button class="nav-btn" id="nav-historyScreen" onclick="switchTab('historyScreen'); loadHistory();">
                <span class="nav-icon">📜</span>
                <span>History</span>
            </button>
        </div>
    </div>

    <script>
        let isActive = false;
        let isFetching = false;
        let currentServer = 'PREMIUM';
        let wins = 0; let losses = 0; let botLevel = 1;
        let lastProcessedPeriod = "";
        let pendingPrediction = null; 
        let lastTgMessageId = null; // Stores ID to delete on loss
        let syncLoop; let clockLoop;
        
        const apiUrl = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json?pageSize=1000";

        document.getElementById('botToken').value = localStorage.getItem('raoToken') || "";
        document.getElementById('chatId').value = localStorage.getItem('raoChatId') || "";

        function showToast(message, color = "#fff") {
            let toast = document.getElementById("toast");
            toast.innerText = message; toast.style.borderColor = color; toast.style.color = color; toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2000);
        }

        function saveSettings() {
            localStorage.setItem('raoToken', document.getElementById('botToken').value);
            localStorage.setItem('raoChatId', document.getElementById('chatId').value);
            let msg = document.getElementById('saveMsg');
            msg.style.display = "block"; setTimeout(() => { msg.style.display = "none"; }, 3000);
        }

        // STICKERS
        const winFirstSticker = "CAACAgUAAxkBAAEQg65pkGLJ3sfc9IXFEvzrDZxtQULGxQACuxMAAtZgYVZaFxCncOnSvjoE";
        const winMiddleStickers = ["CAACAgUAAxkBAAEQlKRpmc6YKoTbG9mtawI1wwABuQcxkfQAAkoTAAKLKmFWDJoBh856d0Y6BA", "CAACAgUAAxkBAAEQlKZpmc6aK74AAdmQTU5pzHvRwaqw7kYAAhcNAAKnzeBWXQtoMocETe06BA"];
        const winLastStickers = ["CAACAgUAAxkBAAEQlK5pmc6yU2kj7DMmOHGDzzo82qxT1gAC1hMAAmp9YVbvJhOMbbSNmDoE", "CAACAgUAAxkBAAEQlKhpmc6etFnxDItnzJwhAWlPXg240gAC0xMAAtJlYVZ8CDYuQ-4m-DoE"];
        const lossStickers = ["CAACAgUAAxkBAAEQlLJpmc6_OGO-OzS4pO4D6BxunLlM2QACcRQAAiWLYFaCAQAB8ZzOON86BA", "CAACAgUAAxkBAAEQlKJpmc6TGK5kA5LlPk4RmwWv2F-obgAC4BEAAsSNmVRK1rmkcLLTfDoE"];

        function getSticker(array, periodString) { return array[Number(BigInt(periodString) % BigInt(array.length))]; }

        function startClock() {
            clockLoop = setInterval(() => {
                let currentSeconds = new Date().getSeconds();
                let countdown = 30 - (currentSeconds % 30);
                document.getElementById('liveTime').innerText = countdown + "s";
                if(countdown <= 5) { document.getElementById('liveTime').style.color = "#ff3366"; document.getElementById('liveTime').style.textShadow = "0 0 15px #ff3366"; } 
                else { document.getElementById('liveTime').style.color = "#00e5ff"; document.getElementById('liveTime').style.textShadow = "0 0 15px #00e5ff"; }
            }, 1000);
        }
        startClock();

        function switchTab(tabId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + tabId).classList.add('active');
        }

        async function toggleBot() {
            let btn = document.getElementById('powerBtn');
            if(isActive) {
                isActive = false; clearInterval(syncLoop);
                
                // USER REQUEST: If bot stops, delete the last pending bet message!
                if(lastTgMessageId !== null) {
                    await deleteTgMessage(lastTgMessageId);
                    addLog("Deleted last bet to avoid risk.", "log-del");
                    lastTgMessageId = null;
                }

                updateLiveUI("Session Ended", "--", "#fff");
                addLog("System Hang Stopped!"); showToast("Bot Offline", "#ff3366");
                let stopMsg = "🛑 <b>SYSTUMM HANG SESSION ENDED</b> 🛑\n\nPredictions stopped. Calculate your profits!";
                await sendTgMessage(stopMsg);
                btn.innerHTML = "▶️ START VIP"; btn.classList.remove('active-stop');
            } else {
                showToast("Connecting to API...", "#00e5ff");
                setTimeout(async () => {
                    isActive = true; wins = 0; losses = 0; botLevel = 1; updateStats();
                    lastProcessedPeriod = ""; pendingPrediction = null; lastTgMessageId = null;
                    document.getElementById('sessionLog').innerHTML = "";
                    addLog("Bot Started! Syncing..."); showToast("Connected & Syncing!", "#00ffaa");
                    let startMsg = "💠 <b>SYSTUMM HANG VIP DESTINATION STARTED</b> 💠\n\nSystem is ACTIVE. All members get ready!";
                    await sendTgMessage(startMsg);
                    syncLoop = setInterval(botLogicTick, 1500);
                    btn.innerHTML = "⏹️ STOP VIP"; btn.classList.add('active-stop');
                }, 800);
            }
        }

        function setServer(server) {
            currentServer = server;
            document.getElementById('btnAiPro').className = 'server-btn';
            document.getElementById('btnPremium').className = 'server-btn';
            if(server === 'AIPRO') document.getElementById('btnAiPro').classList.add('active', 'aipro');
            if(server === 'PREMIUM') document.getElementById('btnPremium').classList.add('active', 'premium');
            addLog(`Server switched to: ${server}`);
        }

        function updateStats() {
            document.getElementById('winCount').innerText = wins;
            document.getElementById('lossCount').innerText = losses;
            document.getElementById('currentLevelDisplay').innerText = botLevel;
        }

        function updateLiveUI(period, text, colorCode) {
            document.getElementById('predPeriod').innerText = `Period: ${period}`;
            document.getElementById('predValue').innerHTML = `<span style="color:${colorCode}">${text}</span>`;
        }

        function addLog(msg, type = "normal") {
            const logBox = document.getElementById('sessionLog');
            if(logBox.innerHTML.includes("Bot is offline")) logBox.innerHTML = "";
            let cssClass = "log-entry"; 
            if(type === "win") cssClass += " log-win"; 
            if(type === "loss") cssClass += " log-loss";
            if(type === "log-del") cssClass += " log-del";
            let timeStr = new Date().toLocaleTimeString('en-IN', { hour12: false });
            logBox.innerHTML = `<div class="${cssClass}">[${timeStr}] ${msg}</div>` + logBox.innerHTML;
        }

        function getTgData() { return { token: document.getElementById('botToken').value, chatId: document.getElementById('chatId').value }; }
        
        // TELEGRAM SENDER (Saves Message ID)
        async function sendTgMessage(text) {
            const { token, chatId } = getTgData(); if(!token || !chatId) return;
            try { 
                let response = await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}&parse_mode=HTML`); 
                let data = await response.json();
                if(data.ok && data.result) return data.result.message_id;
            } catch(e) {}
            return null;
        }

        async function sendTgSticker(stickerId) {
            const { token, chatId } = getTgData(); if(!token || !chatId) return;
            try { await fetch(`https://api.telegram.org/bot${token}/sendSticker?chat_id=${chatId}&sticker=${stickerId}`); } catch(e) {}
        }

        // DELETE MESSAGE FUNCTION (The Ultimate Fix for Loss)
        async function deleteTgMessage(msgId) {
            const { token, chatId } = getTgData(); if(!token || !chatId || !msgId) return;
            try { await fetch(`https://api.telegram.org/bot${token}/deleteMessage?chat_id=${chatId}&message_id=${msgId}`); } catch(e) {}
        }

        // ENGINE: RAO PREMIUM
        function raoPremiumCalculation(dataList, targetPeriod) {
            if (!dataList || dataList.length < 4) return { isBig: true, conf: 85 };

            let lastNum = parseInt(dataList[0].number); let lastDigit = parseInt(targetPeriod.toString().slice(-1));
            let matrixPred = null;
            if (lastDigit === 1) { if ([1, 3].includes(lastNum)) matrixPred = false; if ([5, 7, 9].includes(lastNum)) matrixPred = true; } 
            else if (lastDigit === 0) { if ([2, 4].includes(lastNum)) matrixPred = false; if (lastNum === 8) matrixPred = true; }

            let isLBig = parseInt(dataList[0].number) > 4; let isPBig = parseInt(dataList[1].number) > 4;
            let isP2Big = parseInt(dataList[2].number) > 4; let isP3Big = parseInt(dataList[3].number) > 4;
            let trendPred = null;
            if (isLBig === isPBig && isPBig === isP2Big) trendPred = isLBig; // Dragon
            else if (isLBig !== isPBig && isPBig !== isP2Big && isP2Big !== isP3Big) trendPred = !isLBig; // ABAB
            else if (isLBig === isPBig && isPBig !== isP2Big && isP2Big === isP3Big) trendPred = !isLBig; // AABB

            let finalIsBig;
            if (matrixPred !== null) finalIsBig = matrixPred; else if (trendPred !== null) finalIsBig = trendPred; else finalIsBig = (lastNum <= 4); 

            // Dynamic Config 85% to 98%
            let dynConf = Math.floor(Math.random() * (98 - 85 + 1)) + 85;
            return { isBig: finalIsBig, conf: dynConf };
        }

        // ENGINE: AI PRO
        function aiProCalculation() {
            let isBig = Math.random() >= 0.5; let conf = Math.floor(Math.random() * (95 - 80 + 1)) + 80; 
            return { isBig: isBig, conf: conf };
        }

        async function fetchApi() {
            try { let res = await fetch(apiUrl); let json = await res.json(); if(json && json.data && json.data.list) return json.data.list; } catch (e) {} return null;
        }

        async function botLogicTick() {
            if (!isActive || isFetching) return; isFetching = true; 
            let data = await fetchApi(); if (!data) { isFetching = false; return; }

            let latestPeriod = data[0].issueNumber; let latestNumber = data[0].number; let latestIsBig = latestNumber >= 5;

            if (lastProcessedPeriod !== "" && latestPeriod !== lastProcessedPeriod) {
                lastProcessedPeriod = latestPeriod;

                if (pendingPrediction !== null && pendingPrediction.period === latestPeriod) {
                    if (pendingPrediction.isBig === latestIsBig) {
                        // WIN LOGIC
                        wins++; addLog(`WON Period ${latestPeriod} (Level ${botLevel})`, "win");
                        botLevel = 1; updateStats(); 
                        
                        await sendTgSticker(winFirstSticker);
                        await sendTgSticker(getSticker(winMiddleStickers, latestPeriod + "1"));
                        await sendTgSticker(getSticker(winLastStickers, latestPeriod + "2"));
                        lastTgMessageId = null; // Win ho gaya, toh delete karne ki jarurat nahi
                    } else {
                        // LOSS LOGIC
                        losses++; addLog(`LOST Period ${latestPeriod} (Level ${botLevel})`, "loss");
                        
                        // DELETING THE LOSING BET FROM TELEGRAM
                        if(lastTgMessageId !== null) {
                            await deleteTgMessage(lastTgMessageId);
                            addLog("Loss Msg Deleted from Telegram!", "log-del");
                            lastTgMessageId = null;
                        }

                        // Managing Levels strictly to 1 and 2
                        botLevel++; 
                        if(botLevel > 2) botLevel = 1; // Strict loop 1 -> 2 -> 1
                        updateStats(); 
                    }
                }

                let nextPeriod = (BigInt(latestPeriod) + 1n).toString();
                let resultObj = (currentServer === 'PREMIUM') ? raoPremiumCalculation(data, nextPeriod) : aiProCalculation();
                pendingPrediction = { period: nextPeriod, isBig: resultObj.isBig };
                
                let typeStr = resultObj.isBig ? "BIG" : "SMALL";
                let uiColorCode = resultObj.isBig ? "#ff3366" : "#00ffaa";
                
                // Fund multiplier based on level
                let fundM = (botLevel === 1) ? "1X (₹10)" : "3X (₹30)";
                
                // Risk Check
                let riskText = (Math.random() > 0.7) ? "⚠️ HIGH" : "✅ LOW";

                updateLiveUI(nextPeriod, typeStr, uiColorCode);

                let serverName = (currentServer === 'PREMIUM') ? "RAO PREMIUM" : "AI PRO";

                let vipMsg = `💠 <b>SYSTUMM HANG VIP SIGNAL</b> 💠\n\n🎯 Game: Wingo 30 sec \n🆔 Period: <b>${nextPeriod}</b>\n\n🔥 Prediction: <b>${typeStr}</b>\n💰 Fund: <b>${fundM}</b>\n\n🖥️ Server: ${serverName}\n📈 Accuracy: ${resultObj.conf}%\n${riskText}\n\n💎 Powered By: RAO SAHAB SYSTEM`;
                
                // Store message ID to delete if loss
                lastTgMessageId = await sendTgMessage(vipMsg); 
                addLog(`Signal Sent: ${typeStr} (Level ${botLevel})`);
            } else if (lastProcessedPeriod === "") { lastProcessedPeriod = latestPeriod; addLog("API Connected. Ready for signal..."); }
            isFetching = false;
        }

        // SIDE-BY-SIDE HISTORY UI
        async function loadHistory() {
            const container = document.getElementById('historyContainer');
            container.innerHTML = '<p style="text-align:center; color:#00e5ff;">Syncing Data...</p>'; 

            let data = await fetchApi();
            if(data) {
                let displayData = data.slice(0, 15);
                let revData = [...displayData].reverse();
                let simLevel = 1;
                let historyHTML = '';

                for(let i=0; i<revData.length - 1; i++) {
                    let actualData = revData[i];
                    let actualIsBig = actualData.number >= 5;
                    let pastDataForCalculation = data.slice(data.indexOf(actualData) + 1);

                    let botResult = (currentServer === 'PREMIUM') ? raoPremiumCalculation(pastDataForCalculation, actualData.issueNumber) : aiProCalculation();
                    let botPredIsBig = botResult.isBig;
                    let isWin = (actualIsBig === botPredIsBig);
                    
                    let badge = '';
                    if(isWin) { badge = `<div class="badge badge-win">✅ WIN (L${simLevel})</div>`; simLevel = 1; } 
                    else { badge = `<div class="badge badge-loss">❌ LOSS (L${simLevel})</div>`; simLevel++; if(simLevel > 2) simLevel = 1; }

                    let botPredText = botPredIsBig ? "BIG" : "SMALL";
                    let botPredClass = botPredIsBig ? "txt-red" : "txt-green";

                    let gameColor = ([1,3,7,9].includes(actualData.number)) ? "🟢 GREEN" : ([2,4,6,8].includes(actualData.number)) ? "🔴 RED" : "🟣 VIOLET";
                    if(actualData.number === 0 || actualData.number === 5) gameColor += (actualData.number===0)?"+🔴":"+🟢";
                    
                    let gameText = actualIsBig ? "🔴 BIG" : "🟢 SMALL";

                    historyHTML = `
                    <div class="history-card">
                        <div class="h-period">PERIOD: ${actualData.issueNumber}</div>
                        <div class="h-body">
                            <div class="h-side">
                                <div class="h-title">Bot Predicted</div>
                                <div class="h-val ${botPredClass}">${botPredText}</div>
                                ${badge}
                            </div>
                            
                            <div class="h-divider"></div>
                            
                            <div class="h-side">
                                <div class="h-title">Game Result</div>
                                <div class="h-val" style="color:#fff;">${actualData.number} | ${gameText}</div>
                                <div style="font-size:10px; margin-top:5px; font-weight:bold; color:#aaa;">${gameColor}</div>
                            </div>
                        </div>
                    </div>` + historyHTML;
                }
                container.innerHTML = historyHTML;
            }
        }
    </script>
