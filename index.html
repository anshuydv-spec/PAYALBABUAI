<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAO SAHAB AI - 30S ULTRA (AGGRESSIVE)</title> 
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #00e5ff; --secondary: #8892b0; --accent: #ffaa00; 
      --bg: #0b0f19; --card-bg: #111827; --text: #e2e8f0; --input-bg: #1f2937; 
      --success: #10b981; --error: #ef4444; --pending: #f59e0b; --skip: #f97316;
      --shadow-out: 6px 6px 12px #05080f, -6px -6px 12px #111a2b;
      --shadow-in: inset 4px 4px 8px #05080f, inset -4px -4px 8px #111a2b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
    .main-container { width: 100%; max-width: 700px; background: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: var(--shadow-out); border: 1px solid rgba(255,255,255,0.05); }
    
    .header { font-size: 2.5rem; font-weight: 800; text-align: center; color: var(--primary); margin-bottom: 35px; text-shadow: 0 0 10px rgba(0,229,255,0.3); position: relative; }
    .header::after { content: 'ULTIMATE PREDICTION ENGINE'; position: absolute; bottom: -18px; left: 0; right: 0; font-size: 0.85rem; color: var(--accent); letter-spacing: 3px; }

    .nav-tabs { display: flex; justify-content: space-around; margin-bottom: 25px; background: var(--input-bg); border-radius: 12px; box-shadow: var(--shadow-in); padding: 5px; }
    .nav-tab { padding: 12px 20px; cursor: pointer; font-weight: 700; color: var(--secondary); border-radius: 10px; transition: 0.3s; text-transform: uppercase; font-size: 0.9rem; }
    .nav-tab.active { color: var(--primary); background: var(--card-bg); box-shadow: var(--shadow-out); text-shadow: 0 0 5px rgba(0,229,255,0.4); }
    .tab-content { display: none; } .tab-content.active { display: block; animation: fadeIn 0.4s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .card { background: var(--input-bg); border-radius: 15px; padding: 20px; margin: 15px 0; box-shadow: var(--shadow-out); }
    .card div { margin: 10px 0; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    .card i { color: var(--accent); font-size: 1.2rem; }
    
    .prediction-box { background: linear-gradient(135deg, #0f172a, #1e293b); color: #fff; border-radius: 15px; padding: 20px; text-align: center; box-shadow: var(--shadow-in); display: flex; flex-direction: column; align-items: center;}
    .prediction-box.skip { background: linear-gradient(135deg, #7c2d12, #9a3412); }
    .conf-bar { height: 12px; width: 100%; background: rgba(0,0,0,0.5); border-radius: 6px; margin-top: 15px; box-shadow: var(--shadow-in); overflow: hidden; }
    .conf-fill { height: 100%; background: var(--primary); transition: 0.5s; box-shadow: 0 0 10px var(--primary); }

    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
    .stat-card { background: var(--input-bg); border-radius: 12px; padding: 15px 5px; text-align: center; box-shadow: var(--shadow-out); }
    .stat-val { font-size: 1.5rem; font-weight: 800; margin: 5px 0; }
    .stat-lbl { font-size: 0.7rem; color: var(--secondary); text-transform: uppercase; }

    .input-group label { display: block; font-size: 0.9rem; margin-bottom: 5px; font-weight: 600; }
    .input-group input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--bg); color: var(--text); margin-bottom: 15px; box-shadow: var(--shadow-in); outline: none; }
    .btn { padding: 12px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; width: 100%; box-shadow: 4px 4px 10px rgba(0,0,0,0.5); }
    .btn-save { background: var(--secondary); color: white; margin-bottom: 15px; }
    .btn-primary { background: linear-gradient(135deg, #00b4d8, #0077b6); color: white; }
    .btn-danger { background: linear-gradient(135deg, #e63946, #d90429); color: white; }
    .btn-group { display: flex; gap: 10px; }
    .btn-group .btn { flex: 1; }

    .status-box { margin-top: 15px; padding: 10px; border-radius: 10px; text-align: center; font-weight: bold; display: none; }

    table { width: 100%; border-collapse: collapse; margin-top: 15px; background: var(--input-bg); box-shadow: var(--shadow-out); border-radius: 10px; overflow: hidden; }
    th, td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
    th { color: var(--primary); }
    .icon { width: 28px; height: 28px; border-radius: 50%; display: inline-flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 0.8rem; }
    .win { background: var(--success); } .loss { background: var(--error); } .pend { background: var(--pending); }

    .results-flex { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
    .circle { width: 60px; height: 60px; border-radius: 50%; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; flex-shrink: 0; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); font-weight: bold; }
    .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="header">RAO SAHAB AI</div>

    <div class="nav-tabs">
      <div class="nav-tab active" onclick="switchTab('home', this)">Home</div>
      <div class="nav-tab" onclick="switchTab('prediction', this)">Prediction</div>
      <div class="nav-tab" onclick="switchTab('analyse', this)">Data Hub</div>
    </div>
    
    <div id="home" class="tab-content active">
      <div class="card">
        <div class="input-group">
          <label><i class="fas fa-robot"></i> Telegram Bot Token</label>
          <input type="text" id="botToken" placeholder="Enter Bot Token">
        </div>
        <div class="input-group">
          <label><i class="fas fa-hashtag"></i> Channel ID</label>
          <input type="text" id="channelId" placeholder="Enter Channel ID (-100...)">
        </div>
        <button id="saveCreds" class="btn btn-save"><i class="fas fa-save"></i> Save Details</button>
        
        <div class="btn-group">
          <button id="startSession" class="btn btn-primary"><i class="fas fa-power-off"></i> Start Engine</button>
          <button id="stopSession" class="btn btn-danger" disabled><i class="fas fa-ban"></i> Stop</button>
        </div>
        <div id="sessionStatus" class="status-box"></div>
      </div>
    </div>
    
    <div id="prediction" class="tab-content">
      <div class="card">
        <div id="currentPeriod" style="color: var(--primary);"><i class="fas fa-crosshairs"></i> Target Period: Loading...</div>
        <div id="liveTime" style="color: var(--accent);"><i class="fas fa-stopwatch"></i> Execution In: --:--</div>
        <hr style="border: 1px dashed rgba(255,255,255,0.1); margin: 15px 0;">
        <div id="predictionBox" class="prediction-box">
          <div class="spinner"></div>
          <p style="margin-top:15px;">Syncing with Rao Sahab Servers...</p>
        </div>
      </div>
    </div>

    <div id="analyse" class="tab-content">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-lbl">Total</div><div class="stat-val" style="color:var(--primary);" id="st-tot">0</div></div>
        <div class="stat-card"><div class="stat-lbl">Wins</div><div class="stat-val" style="color:var(--success);" id="st-win">0</div></div>
        <div class="stat-card"><div class="stat-lbl">Losses</div><div class="stat-val" style="color:var(--error);" id="st-loss">0</div></div>
        <div class="stat-card"><div class="stat-lbl">Win Rate</div><div class="stat-val" style="color:var(--success);" id="st-rate">0%</div></div>
      </div>
      
      <h3 style="color:var(--accent); font-size: 1rem; margin-top: 15px;"><i class="fas fa-bolt"></i> Live Stream</h3>
      <div class="results-flex" id="liveResults"></div>

      <table>
        <thead><tr><th>Period</th><th>AI Call</th><th>Result</th><th>Status</th></tr></thead>
        <tbody id="historyTable"><tr><td colspan="4">Awaiting Intelligence...</td></tr></tbody>
      </table>
      <button onclick="clearHistory()" class="btn btn-danger" style="margin-top: 15px;"><i class="fas fa-trash"></i> Purge Records</button>
    </div>
  </div>

<script>
  // --- CORE CONFIG ---
  const HISTORY_API = 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json';
  
  // Stickers
  const WIN_FIRST = 'CAACAgUAAxkBAAEDEC9pCVVRUpjzq5JD0Xds7EfRQje15wACuxMAAtZgYVZaFxCncOnSvh4E';
  const WIN_MIDS = ['CAACAgUAAxkBAAEDEDdpCXsDjwGlCNvT7EOetSaVSckH-AACvhIAAl2EYFYRGskC145Gkh4E', 'CAACAgUAAxkBAAEDED9pCXtTSZDN91Ecw6ubgma2zRye4AACdRUAAixnYVYGODMz3GAhmh4E'];
  const WIN_LAST = 'CAACAgUAAxkBAAEDEGJpC0WiOqBSFlY2k_zURD0W1XUpEQAC0xMAAtJlYVZ8CDYuQ-4m-B4E';
  const LOSS_STKS = ['CAACAgQAAxkBAAEDEGxpC0W_HrRKrdK-RPSd89tA9OJ-CgACUA8AAmWGgFDT7olWti1e2h4E', 'CAACAgUAAxkBAAEDEUNpELLwfisH8fMa8RAH481Ui_6pcwACoBoAAnliGVS2SjPOJAYbeR4E'];
  const JACKPOT_STK = 'CAACAgUAAxkBAAEQzmlpwRx2CMHoJk0GwlCHBxdq3lN1iQACDBkAAttHMVX4oix29mTKbDoE';

  // State Variables
  let historyLog = [];
  let tgActive = false;
  let botToken = '', chatId = '';
  let currentLossLevel = 0; // 0 = Fresh, 1 = L2, 2 = L3, 3 = L4, etc.
  let lastPredictedSide = "";
  let lastFetchedPeriod = "";
  let sessionStats = { total: 0, win: 0, loss: 0, maxLevel: 0 };

  // Utility
  const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

  // Load Saved Credentials on Startup
  window.onload = () => {
    document.getElementById('botToken').value = localStorage.getItem('rao_token') || '';
    document.getElementById('channelId').value = localStorage.getItem('rao_chatId') || '';
  };

  // Save Credentials Button
  document.getElementById('saveCreds').onclick = () => {
    localStorage.setItem('rao_token', document.getElementById('botToken').value.trim());
    localStorage.setItem('rao_chatId', document.getElementById('channelId').value.trim());
    alert("Credentials Saved Successfully! \nAb tumhe baar-baar details nahi daalni padengi.");
  };

  function switchTab(tabId, element) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    element.classList.add('active');
  }

  // --- HELPERS ---
  function getSide(n) { return n >= 5 ? "Big" : "Small"; }
  function getColor(n) {
    if ([1,3,7,9].includes(n)) return "#10b981";
    if ([2,4,6,8].includes(n)) return "#ef4444";
    return "linear-gradient(135deg, #10b981 50%, #8b5cf6 50%)"; // Mix for 0, 5
  }

  function calcTimer() {
    const d = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
    const secs = d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds() - (5*3600 + 30*60);
    const eSecs = secs < 0 ? secs + 86400 : secs;
    
    const periodSeq = "5" + String(Math.floor(eSecs/30) + 1).padStart(4, '0');
    const fullPeriod = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}10000${periodSeq}`;
    
    return { full: fullPeriod, short: periodSeq, remain: 30 - (eSecs%30) };
  }

  // ======================================================================
  // 🔥 NEW AGGRESSIVE REVERSE ENGINE (COMPANY CHAKMA) 🔥
  // ======================================================================
  function getPredictionLogic(targetNum, history100) {
    let side = "Small";
    let src = "Waiting Data";
    let conf = 50;
    let exactTarget = -1;

    if(history100.length >= 10) {
      let n1 = history100[0].number; // Latest
      let n2 = history100[1].number; // 2nd Latest
      let p_last = targetNum % 10;   // Period ka last digit
      
      if (currentLossLevel === 0) {
        // --- LEVEL 1 : DIRECT ATTACK (NO SKIP) ---
        
        // Formula 1: Last 5 Sum
        let sum5 = 0;
        for(let j=0; j<5; j++) sum5 += history100[j].number;
        let f1_pred = (sum5 % 10) >= 5 ? "Big" : "Small";

        // Formula 2: Rao Sahab Math
        let rs_math = (((n1 + n2) * n1) + p_last) % 10;
        let f2_pred = rs_math >= 5 ? "Big" : "Small";

        // Formula 3: Cross Multiply
        let cross = (p_last * n1) % 10;
        let f3_pred = cross >= 5 ? "Big" : "Small";

        // 🔥 COMPANY CHAKMA LOGIC 🔥
        if (f1_pred === f2_pred && f2_pred === f3_pred) {
          // Teeno formula same bol rahe hain -> matlab Company hume trap kar rahi hai. ULTA MARO!
          side = f1_pred === "Big" ? "Small" : "Big";
          src = "L1: Anti-Company Strike 😈";
          conf = 99; // Peak Confidence
          exactTarget = side === "Big" ? 7 : 2;
        } else {
          // Mixed Signals -> Majority ko follow karo
          let bigCount = 0, smallCount = 0;
          if (f1_pred === "Big") bigCount++; else smallCount++;
          if (f2_pred === "Big") bigCount++; else smallCount++;
          if (f3_pred === "Big") bigCount++; else smallCount++;

          side = bigCount > smallCount ? "Big" : "Small";
          src = "L1: Triple-Factor Math 🎯";
          conf = 88;
          exactTarget = side === "Big" ? (rs_math >= 5 ? rs_math : 8) : (rs_math < 5 ? rs_math : 3);
        }
      } 
      else {
        // --- LEVEL 2+ : AGGRESSIVE SERVER FLIP MATH ---
        // Agar Level 1 fail hua toh server ka seedha algorithm break karo
        let l1Num = lastPredictedSide === "Big" ? 7 : 2;
        let actualResult = history100[0].number;
        let recoveryMath = Math.abs((10 - l1Num + actualResult) % 10);
        
        side = recoveryMath >= 5 ? "Big" : "Small";
        src = `L${currentLossLevel + 1}: Server Flip Recovery ⚡`;
        conf = 95;
        exactTarget = recoveryMath;
      }
    }

    // Generate 2 Target Numbers safely matching the decided side
    let possibleTargets = side === "Big" ? [5,6,7,8,9] : [0,1,2,3,4];
    let targets = [];

    // Inject exact target if valid
    if (exactTarget !== -1 && getSide(exactTarget) === side) {
        targets.push(exactTarget);
        possibleTargets = possibleTargets.filter(n => n !== exactTarget);
    }

    // Fill remaining numbers
    possibleTargets.sort(() => 0.5 - Math.random());
    while(targets.length < 2) {
        targets.push(possibleTargets.pop());
    }
    targets.sort((a,b) => a - b);

    return { side, conf, src, targets };
  }
  // ======================================================================

  // --- TELEGRAM ---
  async function tgMsg(txt) {
    if(!tgActive) return;
    try { await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({chat_id: chatId, text: txt, parse_mode: 'Markdown'}) }); } catch(e){}
  }
  async function tgStk(stk) {
    if(!tgActive) return;
    try { await fetch(`https://api.telegram.org/bot${botToken}/sendSticker`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({chat_id: chatId, sticker: stk}) }); } catch(e){}
  }

  document.getElementById('startSession').onclick = () => {
    botToken = document.getElementById('botToken').value.trim(); chatId = document.getElementById('channelId').value.trim();
    if(!botToken || !chatId) return alert("Bot Token & Channel ID Required!");
    
    sessionStats = { total: 0, win: 0, loss: 0, maxLevel: 0 };
    currentLossLevel = 0;
    
    tgActive = true; 
    document.getElementById('startSession').disabled = true; document.getElementById('stopSession').disabled = false;
    document.getElementById('sessionStatus').style.display = 'block';
    document.getElementById('sessionStatus').innerText = "SYSTEM ONLINE - REVERSE ENGINE ACTIVE";
    document.getElementById('sessionStatus').style.color = "var(--success)";
    tgMsg("🚀 *RAO SAHAB AI ONLINE*\n\nEngine connected. Commencing Aggressive Reverse Logic.");
  };

  document.getElementById('stopSession').onclick = () => {
    tgActive = false;
    document.getElementById('startSession').disabled = false; document.getElementById('stopSession').disabled = true;
    document.getElementById('sessionStatus').innerText = "SYSTEM OFFLINE";
    document.getElementById('sessionStatus').style.color = "var(--error)";
    
    historyLog = historyLog.filter(x => x.status !== "Pending");
    updateUI([]);

    let stopMsg = `🛑 *RAO SAHAB AI SESSION ENDED* 🛑\n\n` +
                  `📊 *SESSION SUMMARY*\n` +
                  `🎯 Total Bets: ${sessionStats.total}\n` +
                  `✅ Total Wins: ${sessionStats.win}\n` +
                  `❌ Total Losses: ${sessionStats.loss}\n` +
                  `🔥 Max Level Reached: Level ${sessionStats.maxLevel + 1}\n\n` +
                  `Engine powered down.`;
    tgMsg(stopMsg);
  };

  // --- MAIN LOOP ---
  async function loop() {
    const t = calcTimer();
    document.getElementById("currentPeriod").innerHTML = `<i class="fas fa-crosshairs"></i> Target: <strong>${t.short}</strong>`;
    document.getElementById("liveTime").innerHTML = `<i class="fas fa-stopwatch"></i> Execution In: <strong>00:${String(t.remain).padStart(2,'0')}</strong>`;

    if((t.remain === 28 || t.remain === 27) && lastFetchedPeriod !== t.full) {
      lastFetchedPeriod = t.full;
      
      try {
        let res = await fetch(HISTORY_API + "?ts=" + Date.now());
        let json = await res.json();
        let hist = json.data.list.slice(0,100).map(x => ({ p: x.issueNumber, number: parseInt(x.number) }));
        
        let pending = historyLog.find(x => x.status === "Pending");
        if(pending) {
          let match = hist.find(x => x.p === pending.period || x.p.slice(-5) === pending.period.slice(-5));
          if(match) {
            sessionStats.total++;
            pending.actual = getSide(match.number);
            pending.status = pending.pred === pending.actual ? "Win" : "Loss";
            
            if(pending.status === "Loss") {
              sessionStats.loss++;
              currentLossLevel++;
              sessionStats.maxLevel = Math.max(sessionStats.maxLevel, currentLossLevel);
            } else { 
              sessionStats.win++;
              currentLossLevel = 0; 
            }

            if(tgActive) {
              if(pending.status === "Win") {
                await tgStk(WIN_FIRST);
                await sleep(1000);
                
                let isJackpot = pending.targets && pending.targets.includes(match.number);
                if(isJackpot) {
                  await tgStk(JACKPOT_STK);
                  await sleep(1000);
                }

                await tgStk(WIN_MIDS[Math.floor(Math.random()*WIN_MIDS.length)]);
                await sleep(1000);
                await tgStk(WIN_LAST);
                await sleep(1000);
              } else { 
                await tgStk(LOSS_STKS[Math.floor(Math.random()*LOSS_STKS.length)]); 
                await sleep(1000);
              }
            }
          }
        }

        let targetNum = parseInt(t.full.slice(-4));
        let predData = getPredictionLogic(targetNum, hist);
        let finalSide = predData.side;
        
        lastPredictedSide = finalSide;
        let cHex = finalSide === "Big" ? "var(--accent)" : "var(--primary)";
        
        let displayLevel = currentLossLevel === 0 ? "FRESH BET" : `LEVEL ${currentLossLevel + 1} RECOVERY`;
        
        let pBox = document.getElementById("predictionBox");
        pBox.innerHTML = `
          <div style="font-size: 1rem; color: var(--secondary); margin-bottom: 5px; font-weight:bold;">Period: <span style="color: #fff;">${t.short}</span> | <span style="color: var(--skip);">${displayLevel}</span></div>
          <h2 style="color:${cHex}; font-size:3rem; text-shadow:0 0 15px ${cHex}; text-transform:uppercase; margin: 0; line-height: 1;">${finalSide}</h2>
          <div style="font-size: 1.4rem; color: #fff; margin-top: 5px; font-weight: 800; letter-spacing: 2px;">🎯 ${predData.targets.join(' | ')}</div>
          <div style="font-size:0.8rem; margin-top:10px; color:var(--secondary);">Source: ${predData.src} | Conf: ${predData.conf}%</div>
          <div class="conf-bar"><div class="conf-fill" style="width:${predData.conf}%; background:${cHex}; box-shadow:0 0 10px ${cHex};"></div></div>
        `;
        
        historyLog.unshift({ period: t.full, pred: finalSide, targets: predData.targets, actual: "--", status: "Pending" });
        
        if(tgActive) {
          let lvlTxt = currentLossLevel > 0 ? `🔥 *RECOVERY LEVEL ${currentLossLevel + 1}* 🔥` : `✅ *FRESH BET*`;
          tgMsg(`⚡️ *RAO SAHAB AI SYSTEM* ⚡️\n\n🎯 *GAME:* WINGO 30S\n🔢 *PERIOD:* ${t.short}\n${lvlTxt}\n\n🚀 *PREDICTION: ${finalSide.toUpperCase()}*\n🎯 *TARGETS: ${predData.targets.join(', ')}*\n⚙️ *ENGINE:* ${predData.src}`);
        }

        updateUI(hist);

      } catch(e) { console.error("API Error", e); }
    }
  }

  function updateUI(hist) {
    if(hist && hist.length > 0) {
      document.getElementById("liveResults").innerHTML = hist.slice(0,8).map(x => 
        `<div class="circle" style="background:${getColor(x.number)}"><div>${x.number}</div><div style="font-size:0.7rem;">${getSide(x.number)[0]}</div></div>`
      ).join('');
    }

    let tb = document.getElementById("historyTable");
    tb.innerHTML = historyLog.slice(0,30).map(x => `
      <tr><td>${x.period.slice(-5)}</td><td>${x.pred}</td><td>${x.actual}</td>
      <td><div class="icon ${x.status==="Win"?'win':x.status==="Loss"?'loss':'pend'}">${x.status[0]}</div></td></tr>
    `).join('');

    let w = historyLog.filter(x=>x.status==="Win").length;
    let l = historyLog.filter(x=>x.status==="Loss").length;
    let tot = w+l;
    document.getElementById("st-tot").innerText = tot;
    document.getElementById("st-win").innerText = w;
    document.getElementById("st-loss").innerText = l;
    document.getElementById("st-rate").innerText = tot ? Math.round((w/tot)*100)+"%" : "0%";
  }

  function clearHistory() { if(confirm("Clear local data?")) { historyLog = []; updateUI([]); } }

  setInterval(loop, 1000);
</script>
</body>
</html>
