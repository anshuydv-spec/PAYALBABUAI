<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Systumm Hang - Aviator Predictor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background-color: #0a0a0a; color: #00ffcc; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .container { background: #111; border: 2px solid #00ffcc; border-radius: 15px; padding: 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); }
        
        h1 { font-size: 24px; color: #fff; text-shadow: 0 0 10px #00ffcc; margin-bottom: 5px; text-transform: uppercase; }
        p.subtitle { color: #888; font-size: 12px; margin-bottom: 25px; }

        .data-box { background: #000; border: 1px dashed #444; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .data-label { color: #aaa; }
        .data-value { font-weight: bold; color: #fff; }

        .prediction-circle { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #333; margin: 0 auto 25px auto; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); transition: all 0.3s ease; }
        .prediction-value { font-size: 36px; font-weight: bold; color: #555; }
        .prediction-label { font-size: 12px; color: #777; margin-top: 5px; }

        .btn { background: #00ffcc; color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; box-shadow: 0 0 10px #00ffcc; }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { background: #333; color: #666; box-shadow: none; cursor: not-allowed; }

        /* Loader Animation */
        .loader { border: 4px solid #111; border-top: 4px solid #00ffcc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; display: none; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>Systumm Hang</h1>
        <p class="subtitle">PROVABLY FAIR PREDICTOR</p>

        <div class="data-box">
            <div class="data-row">
                <span class="data-label">Status:</span>
                <span class="data-value" id="status" style="color: #ff3333;">Disconnected</span>
            </div>
            <div class="data-row">
                <span class="data-label">Round ID:</span>
                <span class="data-value" id="round-id">waiting...</span>
            </div>
        </div>

        <div class="prediction-circle" id="circle">
            <div class="loader" id="loader"></div>
            <div class="prediction-value" id="multiplier">0.00x</div>
            <div class="prediction-label" id="trend-label">Press Button</div>
        </div>

        <button class="btn" id="action-btn" onclick="startPrediction()">CONNECT TO SERVER</button>
    </div>

    <script>
        // Telegram Web App Initialization
        const tg = window.Telegram.WebApp;
        tg.expand(); // Opens UI in full screen inside Telegram

        let isConnected = false;

        // Smart Algorithm to generate realistic Round IDs and Multipliers based on time
        function generatePrediction() {
            const now = new Date();
            // Generate a realistic looking Round ID based on current time minute/second
            const baseId = 320000 + (now.getHours() * 60) + now.getMinutes();
            const roundId = baseId.toString() + Math.floor(Math.random() * 9).toString();
            
            // Generate multiplier (Weighted towards 1.20x - 2.50x to look real)
            let multiplier;
            const rand = Math.random();
            if (rand < 0.6) {
                multiplier = (Math.random() * (1.90 - 1.10) + 1.10).toFixed(2); // 60% chance: 1.10x - 1.90x
            } else if (rand < 0.9) {
                multiplier = (Math.random() * (3.50 - 1.91) + 1.91).toFixed(2); // 30% chance: 1.91x - 3.50x
            } else {
                multiplier = (Math.random() * (10.00 - 3.51) + 3.51).toFixed(2); // 10% chance: big multiplier
            }

            return { id: roundId, mul: multiplier };
        }

        function startPrediction() {
            const btn = document.getElementById('action-btn');
            const status = document.getElementById('status');
            const roundIdEl = document.getElementById('round-id');
            const multiplierEl = document.getElementById('multiplier');
            const trendLabel = document.getElementById('trend-label');
            const loader = document.getElementById('loader');
            const circle = document.getElementById('circle');

            if (!isConnected) {
                // Mock Connection Process
                btn.innerText = "CONNECTING...";
                btn.disabled = true;
                
                setTimeout(() => {
                    isConnected = true;
                    status.innerText = "Connected ✅";
                    status.style.color = "#00ffcc";
                    btn.innerText = "FETCH LIVE SIGNAL";
                    btn.disabled = false;
                    tg.HapticFeedback.notificationOccurred('success');
                }, 1500);
            } else {
                // Fetch Signal Process
                btn.disabled = true;
                multiplierEl.style.display = "none";
                trendLabel.style.display = "none";
                loader.style.display = "block";
                circle.style.borderColor = "#333";
                roundIdEl.innerText = "analyzing...";

                setTimeout(() => {
                    const result = generatePrediction();
                    
                    loader.style.display = "none";
                    multiplierEl.style.display = "block";
                    trendLabel.style.display = "block";
                    
                    roundIdEl.innerText = result.id;
                    multiplierEl.innerText = result.mul + "x";
                    
                    // UI styling based on result
                    if (parseFloat(result.mul) >= 2.00) {
                        multiplierEl.style.color = "#ffaa00";
                        circle.style.borderColor = "#ffaa00";
                        trendLabel.innerText = "🔥 HIGH TREND";
                        tg.HapticFeedback.notificationOccurred('warning');
                    } else {
                        multiplierEl.style.color = "#00ffcc";
                        circle.style.borderColor = "#00ffcc";
                        trendLabel.innerText = "✅ SAFE CASHOUT";
                        tg.HapticFeedback.notificationOccurred('success');
                    }
                    
                    btn.disabled = false;
                    
                    // Optional: Send data back to Telegram chat if needed
                    // tg.sendData(JSON.stringify(result));
                    
                }, 2000); // 2 second fake loading for realistic feel
            }
        }
    </script>
</body>
</html>
